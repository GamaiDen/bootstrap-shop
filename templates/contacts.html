<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты - Магазин</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🛍️ Магазин</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" href="/catalog">Каталог</a></li>
                    <li class="nav-item"><a class="nav-link" href="/category">Категории</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/contacts">Контакты</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h1 class="mb-4">Контакты</h1>
        <div class="row">
            <div class="col-md-6">
                <h4>Наш адрес</h4>
                <p>г. Москва, ул. Примерная, д. 123</p>
                <h4>Телефон</h4>
                <p>+7 (999) 123-45-67</p>
                <h4>Email</h4>
                <p>info@shop.ru</p>
                <h4>Режим работы</h4>
                <p>Пн-Пт: 9:00 - 20:00<br>Сб-Вс: 10:00 - 18:00</p>
            </div>
            <div class="col-md-6">
                <h4>Напишите нам</h4>
                <form method="POST" action="/contacts">
                    <div class="mb-3">
                        <input type="text" class="form-control" name="name" placeholder="Ваше имя">
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" name="email" placeholder="Email">
                    </div>
                    <div class="mb-3">
                        <textarea class="form-control" name="message" rows="4" placeholder="Сообщение"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Отправить</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
